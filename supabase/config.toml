  "https://app-sistema-planejamento.vercel.app",
  "https://app-sistema-planejamento.vercel.app/",
  "https://app-sistema-planejamento-git-agent-google-login-appsera.vercel.app",
  "https://app-sistema-planejamento-git-agent-google-login-appsera.vercel.app/",
